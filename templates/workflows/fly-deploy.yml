name: Deploy

on:
  push:
    paths:
      - "**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy or leave empty for all"
        required: false

jobs:
  changed-files:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files || steps.manual.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Changed Files
        id: changed-files
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_max_depth: 1
          dir_names_exclude_current_dir: true
          files_ignore: ".*/**"
          matrix: true
      - name: Manual Files
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ inputs.service }}" ]; then
            echo "matrix=[\"${{ inputs.service }}\"]" >> $GITHUB_OUTPUT
          else
            DIRS=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' -printf '"%f",' | sed 's/,$//')
            echo "matrix=[$DIRS]" >> $GITHUB_OUTPUT
          fi

  deploy:
    if: needs.changed-files.outputs.matrix != '[]'
    name: Deploy
    needs: [changed-files]
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: deploy-${{ matrix.service }}
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changed-files.outputs.matrix) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SERVICE: ${{ matrix.service }}
      SOPS_AGE_KEY: ${{ secrets.AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        run: find . -type f | xargs grep -l 'BEGIN AGE ENCRYPTED FILE' | xargs -n 1 -r sops --decrypt --in-place
      - name: Create Service
        run: flyctl apps create "$SERVICE" || true
      - name: Add Certificates
        run: test -f .certs && xargs -a .certs -I{} flyctl certs add {} --app "$SERVICE" || true
      - name: Import Secrets
        run: test -f .env && grep -v '^sops_' .env | flyctl secrets import --app "$SERVICE" || true
      - name: Deploy
        run: flyctl deploy --app "$SERVICE" --config fly.toml > /dev/null
      - name: Scale Machines
        run: test -f .machine-count && flyctl scale count "$(tr -d '[:space:]' < .machine-count)" --app "$SERVICE" || true
