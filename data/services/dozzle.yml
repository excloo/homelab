# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
identity:
  description: Container Log Viewer
  group: Infrastructure
  name: dozzle
  service: dozzle
  title: Dozzle
imports:
  services:
    agent: dozzle-agent-au-haos
networking:
  port: 30064
  scheme: http
platform_config:
  docker:
    env:
      DOZZLE_ENABLE_ACTIONS: true
      DOZZLE_ENABLE_SHELL: true
      DOZZLE_HOSTNAME: ${server.slug}
      DOZZLE_NO_ANALYTICS: true
      DOZZLE_REMOTE_AGENT: ${servers[services.agent.target].fqdn_internal}:7007
