# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
identity:
  description: Container Log Viewer
  group: Infrastructure
  name: dozzle
  service: dozzle
  title: Dozzle
networking:
  port: 30064
  scheme: http
platform_config:
  docker:
    env:
      DOZZLE_ENABLE_ACTIONS: "true"
      DOZZLE_ENABLE_SHELL: "true"
      DOZZLE_HOSTNAME: "${server.slug}"
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_REMOTE_AGENT: '${join(",", [for k, svc in services : format("%s:7007", servers[svc.target].fqdn_internal) if svc.identity.name == "dozzle-agent" && contains(keys(servers), svc.target)])}'
