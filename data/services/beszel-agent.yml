# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
identity:
  description: Resource Monitoring Agent
  name: beszel-agent
  service: beszel-agent
  title: Beszel Agent
platform_config:
  docker:
    env:
      HUB_URL: http://localhost:30333
      KEY: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPkxnKuxsVqSVZVXQ3OGHjZZFMAAclU/xLrEDdwOyRt+
      LISTEN: 45876
      TOKEN: ${service.token_sensitive}
    labels:
      homepage.description: ${refs.services.beszel.identity.description}
      homepage.href: https://${refs.services.beszel.fqdn_internal}/system/${service.system_id_sensitive}
      homepage.icon: ${refs.services.beszel.identity.name}
      homepage.name: ${refs.services.beszel.identity.title}
      homepage.widget.fields: ${jsonencode(split(",", "status,cpu,memory,network"))}
      homepage.widget.password: ${refs.services.beszel.password_sensitive}
      homepage.widget.systemId: ${service.system_id_sensitive}
      homepage.widget.type: beszel
      homepage.widget.url: https://${refs.services.beszel.fqdn_internal}
      homepage.widget.username: ${defaults.organization.email}
      homepage.widget.version: "2"
references:
  services:
    beszel: beszel-${service.target}
