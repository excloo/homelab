# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - length: 32
      name: db_password
      type: alphanumeric
    - length: 64
      name: homepage_widget_key
      type: alphanumeric
identity:
  description: RSS Reader
  name: miniflux
  title: Miniflux
  username: max@excloo.com
networking:
  port: 30285
  scheme: http
platform_config:
  docker:
    env:
      BASE_URL: "https://${service.fqdn_internal}"
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: Applications
      homepage.href: "https://${service.fqdn_internal}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
      homepage.widget.key: "${service.homepage_widget_key_sensitive}"
      homepage.widget.type: miniflux
      homepage.widget.url: "https://${service.fqdn_internal}"
