# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
identity:
  description: Reverse Proxy
  name: traefik
  title: Traefik
platform_config:
  docker:
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: "${server.description}"
      homepage.href: "https://${service.fqdn_internal}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
      traefik.enable: "true"
      traefik.http.middlewares.autocompress.compress: "true"
      traefik.http.middlewares.internal-only.ipallowlist.sourcerange: 10.0.0.0/23, 100.64.0.0/10, 127.0.0.1/32
      traefik.http.middlewares.tailscale-only.ipallowlist.sourcerange: 100.64.0.0/10, 127.0.0.1/32
      traefik.http.routers.dashboard.middlewares: tailscale-only@docker
      traefik.http.routers.dashboard.rule: "Host(`${service.fqdn_internal}`)"
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.services.traefik.loadbalancer.server.port: "8080"
