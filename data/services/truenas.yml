# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
identity:
  description: Network Attached Storage
  group: Infrastructure
  name: truenas
  service: truenas
  title: TrueNAS
platform_config:
  docker:
    labels:
      homepage.href: "https://${server.fqdn_internal}"
      homepage.widget.enablePools: "true"
      homepage.widget.key: "${service.homepage_widget_key_sensitive}"
      homepage.widget.type: truenas
      homepage.widget.url: "https://${server.fqdn_internal}"
      homepage.widget.version: "2"
      traefik.enable: "true"
      traefik.http.routers.truenas.middlewares: tailscale-only@docker
      traefik.http.routers.truenas.rule: "Host(`${server.fqdn_internal}`)"
      traefik.http.routers.truenas.service: truenas
      traefik.http.services.truenas.loadbalancer.server.url: "https://127.0.0.1:8443"
