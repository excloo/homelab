# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - length: 32
      name: db_password
      type: alphanumeric
    - length: 197
      name: homepage_widget_key
      type: string
    - length: 32
      name: meilisearch_master_key
      type: alphanumeric
    - length: 32
      name: nextauth_secret
      type: alphanumeric
identity:
  description: Bookmark Manager
  name: linkwarden
  title: Linkwarden
networking:
  port: 30243
  scheme: http
platform_config:
  docker:
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: Applications
      homepage.href: "https://${service.fqdn_internal}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
      homepage.widget.key: "${service.homepage_widget_key_sensitive}"
      homepage.widget.type: linkwarden
      homepage.widget.url: "https://${service.fqdn_internal}"
