# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - length: 32
      name: db_password
      type: alphanumeric
    - length: 32
      name: meilisearch_master_key
      type: alphanumeric
    - length: 32
      name: nextauth_secret
      type: alphanumeric
identity:
  description: Bookmark Manager
  group: Applications
  name: linkwarden
  service: linkwarden
  title: Linkwarden
networking:
  port: 30243
  scheme: http
platform_config:
  docker:
    labels:
      homepage.widget.key: "${service.homepage_widget_key_sensitive}"
      homepage.widget.type: "${service.identity.service}"
      homepage.widget.url: "https://${service.fqdn_internal}"
