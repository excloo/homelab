# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - length: 32
      name: auth_secret_key
      type: alphanumeric
    - length: 32
      name: db_password
      type: alphanumeric
    - length: 32
      name: redis_password
      type: alphanumeric
identity:
  description: ROM & Game Library
  group: Media
  name: romm
  service: romm
  title: RoMM
  username: max@excloo.com
networking:
  port: 30061
  scheme: http
platform_config:
  docker:
    env:
      HASHEOUS_API_ENABLED: true
      SCAN_TIMEOUT: 86400
      SCREENSCRAPER_PASSWORD: ${service.screenscraper_password_sensitive}
      SCREENSCRAPER_USER: ${defaults.organization.email}
    labels:
      homepage.widget.type: ${service.identity.service}
      homepage.widget.url: https://${service.fqdn_internal}
