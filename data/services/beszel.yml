# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
identity:
  description: System Monitoring
  name: beszel
  title: Beszel
  username: max@excloo.com
networking:
  port: 30333
  scheme: http
platform_config:
  docker:
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: Infrastructure
      homepage.href: "https://${service.fqdn_internal}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
  truenas:
    catalog_app: beszel-hub
