# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - length: 24
      name: db_password
      type: alphanumeric
    - length: 24
      name: homepage_widget_key
      type: alphanumeric
    - length: 24
      name: redis_password
      type: alphanumeric
identity:
  description: Photo Management
  name: immich
  title: Immich
networking:
  port: 30041
  scheme: http
platform_config:
  docker:
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: Media
      homepage.href: "https://${service.fqdn_internal}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
      homepage.widget.key: "${service.homepage_widget_key_sensitive}"
      homepage.widget.type: immich
      homepage.widget.url: "https://${service.fqdn_internal}"
      homepage.widget.version: "2"
  truenas:
    containers:
      - server
