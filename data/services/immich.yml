# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - length: 32
      name: db_password
      type: alphanumeric
    - name: homepage_widget_key
      type: external
    - length: 32
      name: redis_password
      type: alphanumeric
identity:
  description: Photo Management
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
networking:
  port: 30041
  scheme: http
platform_config:
  docker:
    labels:
      homepage.widget.key: ${service.homepage_widget_key_sensitive}
      homepage.widget.type: ${service.identity.service}
      homepage.widget.url: https://${service.fqdn_internal}
      homepage.widget.version: "2"
  truenas:
    containers:
      - server
